<div class="stat-card">
  <div class="stat-card__body">
    <p class="stat-card__label">{{ label | uppercase }}</p>
    <h2 class="stat-card__value">
      {{ value }}
      @if (unite) {
        <span class="stat-card__unite">{{ unite }}</span>
      }
    </h2>
  </div>
  <div class="stat-card__icon" [style.background]="iconBg">
    <span class="material-icons" [style.color]="iconColor">{{ icon }}</span>
  </div>
</div>
