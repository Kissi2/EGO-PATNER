<div class="page">
  <!-- Welcome -->
  <div class="page__welcome">
    <h1 class="page__title">
      <span class="wave">👋</span> Bienvenue sur e-Go
    </h1>
  </div>

  <!-- Stat cards -->
  <div class="stats-grid">
    @for (stat of stats; track stat.label) {
      <lib-stat-card
        [label]="stat.label"
        [value]="statsLoading ? null : stat.value"
        [unite]="stat.unite"
        [icon]="stat.icon"
        [iconBg]="stat.iconBg"
        [iconColor]="stat.iconColor"
      ></lib-stat-card>
    }
  </div>

  <!-- Chart.js gains chart -->
  <div class="chart-card">
    <div class="chart-card__header">
      <h3 class="chart-title">Évolution des Gains</h3>
      <p class="chart-subtitle">Gains mensuels en FCFA</p>
    </div>
    <div class="chart-container">
      @if (chartLoading) {
        <div class="chart-state">
          <span class="material-icons chart-state__spinner">sync</span>
        </div>
      } @else if (chartError) {
        <div class="chart-state chart-state--error">
          <span class="material-icons">error_outline</span>
          <span>Impossible de charger les données</span>
        </div>
      } @else {
        <canvas #gainChart></canvas>
      }
    </div>
  </div>
</div>
