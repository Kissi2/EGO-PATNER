<header class="topbar">
  <!-- Hamburger — visible uniquement sur tablette/mobile -->
  <div class="topbar__left">
    <button class="hamburger" (click)="sidebarState.toggle()" aria-label="Menu">
      <span class="material-icons">{{ sidebarState.isOpen() ? 'close' : 'menu' }}</span>
    </button>
  </div>

  <div class="topbar__right">
    <div class="user-info" (click)="goToProfile()">
      <div class="user-avatar">
        <span class="material-icons">person</span>
      </div>
      <div class="user-details">
        <span class="user-name">{{ admin.name }}</span>
        <span class="user-role">{{ admin.role }}</span>
      </div>
    </div>
  </div>
</header>
